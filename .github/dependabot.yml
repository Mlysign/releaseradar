# S10 — automated dependency updates. Dependabot opens PRs for npm + GitHub
# Actions bumps; CI (ci.yml) gates each one on typecheck/lint/test/build/audit.
# This is how we pick up a patched Next (bundling postcss >= 8.5.10) without
# downgrading Next by hand.
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Batch low-risk minor/patch bumps into one PR to cut noise; majors stay
      # individual so breaking changes get reviewed on their own.
      minor-and-patch:
        update-types: ["minor", "patch"]
    ignore:
      # Major bumps CI red-flagged as toolchain-incompatible — pin to the current
      # major so Dependabot stops re-proposing them. Minor/patch within the major
      # still flow. Remove an entry to revisit once the ecosystem catches up.
      # - ESLint 10 needs eslint-config-next (peer-deps on ESLint 9) to support it.
      # - TypeScript 7 is the new native compiler; too early for next/eslint/vitest.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
