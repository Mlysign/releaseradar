name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Typecheck · Lint · Test · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # matches the Dockerfile (node:22-bookworm-slim)
          cache: npm
      - run: npm ci
      - name: Doc-size guard (informational only, never fails the build)
        # TASKS.md was archived from 441 -> 77 lines on 2026-07-18 specifically to
        # keep planning cheap (see docs/archive/history.md + AGENTS.md doc map).
        # This just nudges a future session to archive a finished phase again
        # rather than letting the file silently re-bloat back to its old size.
        run: |
          LINES=$(wc -l < TASKS.md)
          echo "TASKS.md is $LINES lines"
          if [ "$LINES" -gt 200 ]; then
            echo "::warning file=TASKS.md::TASKS.md is $LINES lines (>200) — consider archiving finished phases into docs/archive/history.md, per AGENTS.md's doc-map convention."
          fi
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      - name: Build
        # Dummy values only satisfy boot-time config validation (P10); they are
        # never used at runtime here. Real secrets live on Railway.
        env:
          JWT_SECRET: ci-placeholder-not-used-at-runtime
          TOKEN_ENCRYPTION_KEY: ci-placeholder-not-used-at-runtime
          TMDB_API_KEY: ci-placeholder
          RAWG_API_KEY: ci-placeholder
          NEXT_PUBLIC_BASE_URL: http://localhost:3000
        run: npm run build

  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Known-accepted (S10): 2 *moderate*, build-time-only advisories via Next's
      # bundled postcss (GHSA-qx2v-qp2m-jg93). npm's only "fix" is downgrading Next,
      # which we refuse — Dependabot will open a PR once Next ships a patched
      # postcss. Fail only on HIGH+ so a genuinely new/serious advisory blocks merge.
      - name: Audit (high or above)
        run: npm audit --audit-level=high
